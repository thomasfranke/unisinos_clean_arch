name: flutter_clean_arch_riverpod
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # UI & Widgets:
  cupertino_icons: ^1.0.8
  fl_chart: ^1.2.0

  # State Management (Riverpod):
  provider: ^6.1.5+1
  nested: ^1.0.0

  # Network & API:
  dio: ^5.9.2

  # Localization (l10n):
  intl: ^0.20.2
  intl_utils: ^2.8.14
  flutter_localizations:
    sdk: flutter

  # Routing:
  auto_route: ^11.1.0
  auto_route_generator: ^10.4.0

  # Storage
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.13.1
  flutter_lints: ^6.0.0
  mocktail: ^1.0.5
  dart_code_linter: ^4.0.3

flutter:
  generate: true
  uses-material-design: true

## dart run dart_code_linter:metrics analyze lib --reporter=json > clean_arch_metrics.json
